name: Build Tauri Installers

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to manually trigger a build via the GitHub Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- SET UP PIPELINES ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Caches Rust targets to slash compilation times on subsequent runs
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Mandated system libraries for Linux compilation environments
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      # --- COMPILE APPLICATION ---
      - name: Install dependencies
        run: npm ci

      - name: Build Tauri Core Application
        run: npx tauri build

      # --- COLLECT PLATFORM ARTIFACTS ---
      # Windows 10+: Grabs the NSIS setup wizard (.exe) and WiX package (.msi)
      - name: Upload Windows Installers
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: eclass-record-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      # Arch Linux: Collects the universal AppImage standalone package
      - name: Upload Linux Installer
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: eclass-record-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
